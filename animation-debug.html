<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Debug Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/umd/index.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f3f4f6; }
        .debug-card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .status { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; margin: 5px 0; }
        .status-success { background: #059669; color: white; }
        .status-error { background: #dc2626; color: white; }
        .status-warning { background: #d97706; color: white; }
        pre { background: #1f2937; color: #f8f8fa; padding: 10px; border-radius: 4px; font-size: 12px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔍 Animation System Debug Test</h1>
    <div class="debug-card">
        <h2>📋 Animation Config Loading Test</h2>
        <div id="config-test"></div>
    </div>
    
    <div class="debug-card">
        <h2>🎭 Animation Function Test</h2>
        <div id="function-test"></div>
    </div>
    
    <div class="debug-card">
        <h2>🧪 Survey Animation Test</h2>
        <div id="survey-test"></div>
    </div>

    <script>
        const { motion, AnimatePresence } = window.Motion;
        
        // Test 1: Check if animationConfig loads correctly
        function testConfigLoading() {
            const configDiv = document.getElementById('config-test');
            
            try {
                // Simulate importing the config (this would normally come from your app)
                const config = {
                    questionAnimation: 'fadeSlideUp',
                    answerAnimation: 'fadeIn',
                    delayMs: 100,
                    speedMs: 400,
                    autoAdvance: false,
                    autoAdvanceDelay: 1500
                };
                
                const animations = {
                    question: {
                        fadeSlideUp: { initial: { opacity: 0, y: 24 }, animate: { opacity: 1, y: 0, transition: { duration: 0.4, delay: 0.1 } }, exit: { opacity: 0, y: -16, transition: { duration: 0.24 } },
                        typewriter: { initial: { opacity: 0, width: 0 }, animate: { opacity: 1, width: '100%', transition: { duration: 0.6, delay: 0.1, ease: 'easeOut' } }, exit: { opacity: 0, transition: { duration: 0.24 } },
                        flipIn: { initial: { opacity: 0, rotateX: 90 }, animate: { opacity: 1, rotateX: 0, transition: { duration: 0.4, delay: 0.1, ease: 'easeOut' } }, exit: { opacity: 0, rotateX: -45, transition: { duration: 0.2 } },
                        zoomBounce: { initial: { opacity: 0, scale: 0.5 }, animate: { opacity: 1, scale: 1, transition: { duration: 0.4, delay: 0.1, type: 'spring', stiffness: 300, damping: 15 } }, exit: { opacity: 0, scale: 0.8, transition: { duration: 0.16 } },
                        slideFromLeft: { initial: { opacity: 0, x: -60 }, animate: { opacity: 1, x: 0, transition: { duration: 0.4, delay: 0.1, ease: 'easeOut' } }, exit: { opacity: 0, x: 40, transition: { duration: 0.2 } },
                        blurReveal: { initial: { opacity: 0, filter: 'blur(12px)' }, animate: { opacity: 1, filter: 'blur(0px)', transition: { duration: 0.4, delay: 0.1 } }, exit: { opacity: 0, filter: 'blur(8px)', transition: { duration: 0.16 } }
                    },
                    answer: {
                        fadeIn: { initial: { opacity: 0 }, animate: { opacity: 1, transition: { duration: 0.32, delay: 0.03 } },
                        popScale: { initial: { opacity: 0, scale: 0.7 }, animate: { opacity: 1, scale: 1, transition: { duration: 0.24, delay: 0.015, type: 'spring', stiffness: 400, damping: 18 } },
                        slideUp: { initial: { opacity: 0, y: 16 }, animate: { opacity: 1, y: 0, transition: { duration: 0.28, delay: 0.015 } },
                        staggerFade: { initial: { opacity: 0, x: -12 }, animate: { opacity: 1, x: 0, transition: { duration: 0.16, delay: 0.04 } },
                        elastic: { initial: { opacity: 0, scale: 0.6, y: 10 }, animate: { opacity: 1, scale: 1, y: 0, transition: { duration: 0.4, delay: 0.018, type: 'spring', stiffness: 250, damping: 12 } },
                        glowReveal: { initial: { opacity: 0, boxShadow: '0 0 0px rgba(255,255,255,0)' }, animate: { opacity: 1, boxShadow: '0 0 12px rgba(255,255,255,0)', transition: { duration: 0.32, delay: 0.018 } }
                    }
                };
                
                // Test getQuestionVariants function
                const questionVariant = animations.question[config.questionAnimation];
                const answerVariant = animations.answer[config.answerAnimation];
                
                configDiv.innerHTML = `
                    <div class="status status-success">✅ Config loaded successfully</div>
                    <pre>Status: ${JSON.stringify(config, null, 2)}</pre>
                    <h4>Question Animation: ${config.questionAnimation}</h4>
                    <p>Variant exists: ${!!questionVariant ? '✅ Yes' : '❌ No'}</p>
                    <h4>Answer Animation: ${config.answerAnimation}</h4>
                    <p>Variant exists: ${!!answerVariant ? '✅ Yes' : '❌ No'}</p>
                `;
                
                return true;
                
            } catch (error) {
                configDiv.innerHTML = `
                    <div class="status status-error">❌ Config loading failed</div>
                    <pre>Error: ${error.message}</pre>
                `;
                return false;
            }
        }
        
        // Test 2: Check if functions work
        function testAnimationFunctions() {
            const functionDiv = document.getElementById('function-test');
            
            try {
                // Simulate the getQuestionVariants and getAnswerVariants functions
                const mockConfig = {
                    questionAnimation: 'fadeSlideUp',
                    answerAnimation: 'fadeIn',
                    delayMs: 100,
                    speedMs: 400
                };
                
                const testResults = [];
                
                // Test all 6 question animations
                const questionAnims = ['fadeSlideUp', 'typewriter', 'flipIn', 'zoomBounce', 'slideFromLeft', 'blurReveal'];
                questionAnims.forEach(anim => {
                    try {
                        const variant = animations.question[anim];
                        testResults.push(`Question ${anim}: ${variant ? '✅' : '❌'}`);
                    } catch (e) {
                        testResults.push(`Question ${anim}: ❌ Error - ${e.message}`);
                    }
                });
                
                // Test all 6 answer animations
                const answerAnims = ['fadeIn', 'popScale', 'slideUp', 'staggerFade', 'elastic', 'glowReveal'];
                answerAnims.forEach(anim => {
                    try {
                        const variant = animations.answer[anim];
                        testResults.push(`Answer ${anim}: ${variant ? '✅' : '❌'}`);
                    } catch (e) {
                        testResults.push(`Answer ${anim}: ❌ Error - ${e.message}`);
                    }
                });
                
                functionDiv.innerHTML = `
                    <div class="status ${testResults.every(r => r.includes('✅')) ? 'status-success' : 'status-error'}">
                        ${testResults.every(r => r.includes('✅')) ? '✅ All animation functions working' : '❌ Some animation functions failed'}
                    </div>
                    <h4>Test Results:</h4>
                    <pre>${testResults.join('\\n')}</pre>
                `;
                
                return testResults.every(r => r.includes('✅'));
                
            } catch (error) {
                functionDiv.innerHTML = `
                    <div class="status status-error">❌ Function test failed</div>
                    <pre>Error: ${error.message}</pre>
                `;
                return false;
            }
        }
        
        // Test 3: Check survey integration
        function testSurveyIntegration() {
            const surveyDiv = document.getElementById('survey-test');
            
            try {
                // Simulate survey data structure
                const mockSurvey = {
                    id: 'test-survey',
                    name: 'Test Survey',
                    animation: {
                        questionAnimation: 'fadeSlideUp',
                        answerAnimation: 'fadeIn',
                        delayMs: 100,
                        speedMs: 400,
                        autoAdvance: false,
                        autoAdvanceDelay: 1500
                    }
                };
                
                // Test animation rendering
                const testHtml = \`
                    <div class="animation-demo">
                        <h4>Testing Survey Animation Integration</h4>
                        <motion.div
                            initial="initial"
                            animate="animate"
                            exit="exit"
                            variants={animations.question[mockSurvey.animation.questionAnimation]}
                        >
                            <span class="demo-text">Test Question Animation</span>
                        </motion.div>
                        
                        <motion.div
                            initial="initial"
                            animate="animate"
                            exit="exit"
                            variants={animations.answer[mockSurvey.animation.answerAnimation]}
                        >
                            <span class="demo-text">Test Answer Animation</span>
                        </motion.div>
                    </div>
                \`;
                
                surveyDiv.innerHTML = testHtml;
                
                // Check if motion elements are created
                const motionElements = document.querySelectorAll('[data-framer-motion-id]');
                
                surveyDiv.innerHTML += \`
                    <div class="status status-success">
                        ✅ Survey integration test completed
                        <br>Motion elements found: \${motionElements.length}
                        <br>Survey data structure: ✅ Valid
                    </div>
                \`;
                
                return motionElements.length > 0;
                
            } catch (error) {
                surveyDiv.innerHTML = \`
                    <div class="status status-error">❌ Survey integration test failed</div>
                    <pre>Error: \${error.message}</pre>
                \`;
                return false;
            }
        }
        
        // Run all tests
        function runAllTests() {
            const results = [];
            
            results.push('Config Loading: ' + (testConfigLoading() ? '✅' : '❌'));
            results.push('Animation Functions: ' + (testAnimationFunctions() ? '✅' : '❌'));
            results.push('Survey Integration: ' + (testSurveyIntegration() ? '✅' : '❌'));
            
            document.body.innerHTML += \`
                <div class="debug-card">
                    <h2>🎯 FINAL TEST RESULTS</h2>
                    <div class="status \${results.every(r => r === '✅') ? 'status-success' : 'status-error'}">
                        \${results.every(r => r === '✅') ? '🎉 ALL TESTS PASSED!' : '⚠️ SOME TESTS FAILED'}
                    </div>
                    <h4>Test Summary:</h4>
                    <pre>\${results.join('\\n')}</pre>
                </div>
            \`;
            
            return results.every(r => r === '✅');
        }
        
        // Auto-run tests
        runAllTests();
    </script>
</body>
</html>
